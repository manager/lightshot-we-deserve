<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="settings.css" />
  <title>Settings</title>
</head>
<body>
  <h1>Lightshot We Deserve</h1>

  <label>Hotkey — select area</label>
  <input id="hk-area" class="hotkey" readonly placeholder="Click and press keys" />

  <label>Hotkey — full screen</label>
  <input id="hk-full" class="hotkey" readonly placeholder="Click and press keys" />

  <label>Save folder <span class="muted">(empty = Desktop)</span></label>
  <input id="save-dir" type="text" placeholder="C:\Users\you\Pictures" />

  <label>Video recording quality</label>
  <select id="video-quality">
    <option value="high">High — native resolution, 30 fps</option>
    <option value="low">Low — up to 720p, 15 fps (smaller files)</option>
  </select>

  <label class="check">
    <input id="autostart" type="checkbox" />
    <span>Start automatically when Windows starts</span>
  </label>

  <div class="row">
    <button id="save" class="primary">Save</button>
    <button id="test">Capture full screen now</button>
    <button id="close">Close</button>
  </div>

  <div id="status"></div>

  <footer>Built by <a href="https://keepsimple.io" target="_blank" rel="noreferrer">keepsimple.io</a> team</footer>

  <script src="settings.js"></script>
</body>
</html>
