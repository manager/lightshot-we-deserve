name: Build Windows app

on:
  push:
    branches: [master, main]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install JS deps
        run: npm install

      - name: Fetch ffmpeg (bundled for video recording)
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path src-tauri/binaries | Out-Null
          $url = "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip"
          Invoke-WebRequest -Uri $url -OutFile ffmpeg.zip
          Expand-Archive -Path ffmpeg.zip -DestinationPath ffmpeg_extract -Force
          $exe = Get-ChildItem -Path ffmpeg_extract -Recurse -Filter ffmpeg.exe | Select-Object -First 1
          Copy-Item $exe.FullName -Destination src-tauri/binaries/ffmpeg.exe -Force
          Write-Host "ffmpeg bundled at src-tauri/binaries/ffmpeg.exe"

      - name: Build app
        run: npm run build

      - name: Collect artifacts
        shell: bash
        run: |
          mkdir -p dist
          cp -v src-tauri/target/release/bundle/nsis/*.exe dist/ || true
          cp -v src-tauri/target/release/*.exe dist/ || true
          ls -la dist

      - name: Upload build
        uses: actions/upload-artifact@v4
        with:
          name: lightshot-we-deserve-windows
          path: dist/*

      - name: Publish release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
